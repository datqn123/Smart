spring.application.name=smart-erp
spring.profiles.default=postgres
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

app.security.api-protection=${APP_SECURITY_MODE:permit-all}
app.security.jwt.secret=${JWT_SECRET:change-me-dev-jwt-secret-32-bytes-min!!}

# Python AI service (SSE) — Spring acts as relay
# Dùng 127.0.0.1 tránh một số môi trường resolve localhost → IPv6 (::1) lệch với chỗ chỉ bind IPv4.
app.ai.python.base-url=${AI_PYTHON_BASE_URL:http://127.0.0.1:9000}
# MCP-shaped read-only DB over HTTP — consumed by ai_python (`SPRING_AI_DB_BASE_URL` → http://localhost:${server.port:8080})

# Multipart: max-file-size = một part (khớp nghiệp vụ ảnh 5MB + Cloudinary); max-request-size = cả request (Task035 tạo SP + tới 10 ảnh SRS §14.2)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=72MB

# Cloudinary: set app.cloudinary.enabled=true and CLOUDINARY_* for server-side upload (multipart).
app.cloudinary.enabled=${CLOUDINARY_ENABLED:false}
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder=${CLOUDINARY_FOLDER:smart-erp/products}
app.cloudinary.max-file-size-bytes=${CLOUDINARY_MAX_BYTES:5242880}

logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=TRACE


