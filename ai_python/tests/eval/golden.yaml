  expect:
    sm_tool: sql_execute
    sql_contains: ["stockdispatch_lines", "stockdispatches"]
    sql_regex: 'order by .+ desc|max\('
    sql_not_regex: 'dispatch_id\s*=\s*(so|salesorders)\.id'

